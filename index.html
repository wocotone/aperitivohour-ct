function isHH(bar, now) {
  const h = now.getHours() + now.getMinutes() / 60;
  const d = now.getDay();
  const hh = bar.happyHour;
  const wd = [1, 2, 3, 4, 5];
  if (hh.days === "Daily")   return h >= hh.start && h < hh.end;
  if (hh.days === "Mon-Fri"  && wd.includes(d))              return h >= hh.start && h < hh.end;
  if (hh.days === "Mon-Thu"  && [1,2,3,4].includes(d))       return h >= hh.start && h < hh.end;
  if (hh.days === "Mon-Sat"  && (wd.includes(d) || d === 6)) return h >= hh.start && h < hh.end;
  if (hh.days === "Tue-Fri"  && [2,3,4,5].includes(d))       return h >= hh.start && h < hh.end;
  if (hh.days === "Tue-Sat"  && [2,3,4,5,6].includes(d))     return h >= hh.start && h < hh.end;
  if (hh.days === "Wed-Fri"  && [3,4,5].includes(d))         return h >= hh.start && h < hh.end;
  if (hh.days === "Mon-Mon"  && d === 1)                      return h >= hh.start && h < hh.end;
  if (d === 6 && hh.sat) return h >= hh.satStart && h < hh.satEnd;
  return false;
}

function minsUntil(bar, now) {
  const h = now.getHours() + now.getMinutes() / 60;
  const d = now.getDay();
  const hh = bar.happyHour;
  const wd = [1, 2, 3, 4, 5];
  const ok = hh.days === "Daily"
    || (hh.days === "Mon-Fri" && wd.includes(d))
    || (hh.days === "Mon-Thu" && [1,2,3,4].includes(d))
    || (hh.days === "Mon-Sat" && (wd.includes(d) || d === 6))
    || (hh.days === "Tue-Fri" && [2,3,4,5].includes(d))
    || (hh.days === "Tue-Sat" && [2,3,4,5,6].includes(d))
    || (hh.days === "Wed-Fri" && [3,4,5].includes(d));
  if (!ok || h >= hh.end) return null;
  if (h < hh.start) return Math.round((hh.start - h) * 60);
  return 0;
}

const LAT_MIN = 40.95, LAT_MAX = 42.05, LNG_MIN = -73.73, LNG_MAX = -71.78;

function projectFull(lat, lng, W, H) {
  const pad = 0.04;
  const x = ((lng - LNG_MIN) / (LNG_MAX - LNG_MIN)) * W * (1 - pad * 2) + W * pad;
  const y = (1 - (lat - LAT_MIN) / (LAT_MAX - LAT_MIN)) * H * (1 - pad * 2) + H * pad;
  return [x, y];
}

function projectZoom(lat, lng, W, H, fLat, fLng) {
  const scale = 22;
  const x = (lng - fLng) * scale * W * 0.1 + W / 2;
  const y = (fLat - lat) * scale * H * 0.13 + H / 2;
  return [x, y];
}

function CanvasMap({ bars, sel, setSel, now, live }) {
  const canvasRef = useRef(null);
  const containerRef = useRef(null);
  const [W, setW] = useState(420);
  const H = Math.round(W * 0.82);
  const DPR = typeof window !== 'undefined' ? window.devicePixelRatio || 1 : 1;

  useEffect(() => {
    if (containerRef.current) setW(containerRef.current.offsetWidth || 420);
  }, []);

  const proj = (lat, lng) => sel
    ? projectZoom(lat, lng, W, H, sel.lat, sel.lng)
    : projectFull(lat, lng, W, H);

  useEffect(() => {
    const canvas = canvasRef.current;
    if (!canvas) return;
    canvas.width = W * DPR;
    canvas.height = H * DPR;
    const ctx = canvas.getContext('2d');
    ctx.scale(DPR, DPR);
    ctx.clearRect(0, 0, W, H);

    // ── BACKGROUND ──
    const bg = ctx.createLinearGradient(0, 0, W, H);
    bg.addColorStop(0, '#0e0e0e');
    bg.addColorStop(1, '#141414');
    ctx.fillStyle = bg;
    ctx.fillRect(0, 0, W, H);

    if (!sel) {
      // Subtle grid
      ctx.strokeStyle = 'rgba(255,255,255,0.025)';
      ctx.lineWidth = 0.5;
      for (let i = 1; i < 8; i++) {
        ctx.beginPath(); ctx.moveTo(W * i / 8, 0); ctx.lineTo(W * i / 8, H); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(0, H * i / 8); ctx.lineTo(W, H * i / 8); ctx.stroke();
      }

      // ── CT STATE FILL ──
      const pts = CT_SHAPE.map(([la, ln]) => projectFull(la, ln, W, H));
      ctx.beginPath();
      ctx.moveTo(pts[0][0], pts[0][1]);
      pts.slice(1).forEach(([x, y]) => ctx.lineTo(x, y));
      ctx.closePath();
      const stateFill = ctx.createLinearGradient(0, 0, W, H);
      stateFill.addColorStop(0, '#1e1e1e');
      stateFill.addColorStop(1, '#1a1a1a');
      ctx.fillStyle = stateFill;
      ctx.fill();
      ctx.strokeStyle = 'rgba(255,107,26,0.25)';
      ctx.lineWidth = 1.5;
      ctx.stroke();

      // ── ROADS ──
      CT_ROADS.forEach(([a, b]) => {
        const [x1, y1] = projectFull(a[0], a[1], W, H);
        const [x2, y2] = projectFull(b[0], b[1], W, H);
        ctx.beginPath();
        ctx.moveTo(x1, y1); ctx.lineTo(x2, y2);
        ctx.strokeStyle = 'rgba(255,255,255,0.06)';
        ctx.lineWidth = 1;
        ctx.stroke();
      });

      // ── TOWN LABELS ──
      CT_TOWNS.forEach(t => {
        const [x, y] = projectFull(t.lat, t.lng, W, H);
        ctx.font = `600 ${Math.max(8, Math.round(W * 0.019))}px monospace`;
        ctx.textAlign = 'center';
        ctx.fillStyle = 'rgba(255,255,255,0.12)';
        ctx.fillText(t.name, x, y);
      });

    } else {
      // ── ZOOMED: subtle grid ──
      ctx.strokeStyle = 'rgba(255,255,255,0.04)';
      ctx.lineWidth = 0.5;
      for (let i = 1; i < 6; i++) {
        ctx.beginPath(); ctx.moveTo(W * i / 6, 0); ctx.lineTo(W * i / 6, H); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(0, H * i / 6); ctx.lineTo(W, H * i / 6); ctx.stroke();
      }
      // Neighborhood label
      ctx.font = `700 ${Math.round(W * 0.028)}px monospace`;
      ctx.textAlign = 'center';
      ctx.fillStyle = 'rgba(255,255,255,0.07)';
      ctx.fillText(sel.neighborhood.toUpperCase(), W / 2, H / 2 + 4);
    }

    // ── BAR DOTS ──
    // Draw non-HH first, then HH on top
    const sorted = [...CT_BARS].sort((a, b) => {
      const aH = isHH(a, now), bH = isHH(b, now);
      return aH === bH ? 0 : aH ? 1 : -1;
    });

    sorted.forEach(bar => {
      const [x, y] = proj(bar.lat, bar.lng);
      if (x < -20 || x > W + 20 || y < -20 || y > H + 20) return;
      const inFilter = bars.includes(bar);
      const hhNow = isHH(bar, now);
      const isSel = sel && sel.id === bar.id;

      if (!inFilter && !isSel) {
        // Dimmed dot
        ctx.beginPath();
        ctx.arc(x, y, 3, 0, Math.PI * 2);
        ctx.fillStyle = 'rgba(255,255,255,0.06)';
        ctx.fill();
        return;
      }

      if (hhNow) {
        // Outer glow ring
        const grad = ctx.createRadialGradient(x, y, 2, x, y, 14);
        grad.addColorStop(0, 'rgba(255,107,26,0.35)');
        grad.addColorStop(1, 'rgba(255,107,26,0)');
        ctx.beginPath();
        ctx.arc(x, y, 14, 0, Math.PI * 2);
        ctx.fillStyle = grad;
        ctx.fill();
      }

      const r = isSel ? 10 : hhNow ? 7 : 5;
      ctx.beginPath();
      ctx.arc(x, y, r, 0, Math.PI * 2);
      if (isSel) {
        ctx.fillStyle = '#fff';
      } else if (hhNow) {
        const dotGrad = ctx.createRadialGradient(x - 1, y - 1, 0, x, y, r);
        dotGrad.addColorStop(0, '#FF8C3A');
        dotGrad.addColorStop(1, '#FF5500');
        ctx.fillStyle = dotGrad;
      } else {
        ctx.fillStyle = '#3a3a3a';
      }
      ctx.fill();

      ctx.strokeStyle = isSel ? '#FF6B1A' : hhNow ? '#FFB380' : '#555';
      ctx.lineWidth = isSel ? 2.5 : 1.5;
      ctx.stroke();

      // Label for selected dot
      if (isSel) {
        const label = bar.name;
        ctx.font = `700 ${Math.round(W * 0.032)}px monospace`;
        const tw = ctx.measureText(label).width;
        const bx = Math.min(Math.max(x - tw / 2 - 10, 4), W - tw - 24);
        const by = y - r - 26;
        // Badge bg
        ctx.fillStyle = 'rgba(7,7,7,0.95)';
        ctx.beginPath();
        ctx.roundRect(bx, by, tw + 20, 24, 4);
        ctx.fill();
        ctx.strokeStyle = '#FF6B1A';
        ctx.lineWidth = 1;
        ctx.stroke();
        ctx.fillStyle = '#fff';
        ctx.textAlign = 'left';
        ctx.fillText(label, bx + 10, by + 16);
        // connector line
        ctx.beginPath();
        ctx.moveTo(x, by + 24); ctx.lineTo(x, y - r - 2);
        ctx.strokeStyle = 'rgba(255,107,26,0.5)';
        ctx.lineWidth = 1;
        ctx.stroke();
      }
    });

    // ── LEGEND ──
    const fs = Math.max(9, Math.round(W * 0.022));
    ctx.font = `600 ${fs}px monospace`;
    ctx.textAlign = 'left';

    // HH NOW
    const lg = ctx.createRadialGradient(12, H - 13, 0, 12, H - 13, 6);
    lg.addColorStop(0, '#FF8C3A'); lg.addColorStop(1, '#FF5500');
    ctx.beginPath(); ctx.arc(12, H - 13, 6, 0, Math.PI * 2);
    ctx.fillStyle = lg; ctx.fill();
    ctx.strokeStyle = '#FFB380'; ctx.lineWidth = 1.5; ctx.stroke();
    ctx.fillStyle = 'rgba(255,255,255,0.5)';
    ctx.fillText('HH NOW', 24, H - 9);

    // UPCOMING
    ctx.beginPath(); ctx.arc(95, H - 13, 5, 0, Math.PI * 2);
    ctx.fillStyle = '#3a3a3a'; ctx.fill();
    ctx.strokeStyle = '#555'; ctx.lineWidth = 1; ctx.stroke();
    ctx.fillStyle = 'rgba(255,255,255,0.3)';
    ctx.fillText('LATER', 106, H - 9);

  }, [bars, sel, now, W, H, DPR]);

  const handleClick = (e) => {
    const rect = canvasRef.current.getBoundingClientRect();
    const cx = (e.clientX - rect.left) * (W / rect.width);
    const cy = (e.clientY - rect.top) * (H / rect.height);
    let closest = null, minDist = 22;
    bars.forEach(bar => {
      const [x, y] = proj(bar.lat, bar.lng);
      const d = Math.hypot(cx - x, cy - y);
      if (d < minDist) { minDist = d; closest = bar; }
    });
    setSel(closest && sel?.id === closest.id ? null : closest);
  };

  return (
    <div ref={containerRef} style={{ position: "relative", width: "100%", background: "#0e0e0e" }}>
      <canvas
        ref={canvasRef}
        width={W * DPR} height={H * DPR}
        onClick={handleClick}
        style={{ width: "100%", height: "auto", display: "block", cursor: "crosshair" }}
      />
      {/* Live pill */}
      <div style={{ position: "absolute", top: 10, left: 10, background: "rgba(7,7,7,0.92)", border: "1px solid rgba(255,107,26,0.4)", borderRadius: 20, padding: "5px 12px", display: "flex", alignItems: "center", gap: 6 }}>
        <div style={{ width: 6, height: 6, borderRadius: "50%", background: "#FF6B1A", animation: "pulse 2s infinite" }} />
        <span style={{ fontSize: 9, color: "#FF6B1A", fontWeight: 700, letterSpacing: 2, fontFamily: "monospace" }}>{live} LIVE NOW</span>
      </div>
      {/* Zoom out */}
      {sel && (
        <button onClick={() => setSel(null)}
          style={{ position: "absolute", top: 10, right: 10, background: "rgba(7,7,7,0.92)", border: "1px solid #333", borderRadius: 20, padding: "5px 12px", color: "#aaa", fontSize: 9, fontWeight: 700, letterSpacing: 1, cursor: "pointer", fontFamily: "monospace" }}>
          ← ALL CT
        </button>
      )}
    </div>
  );
}

function App() {
  const [now, setNow] = useState(new Date());
  const [search, setSearch] = useState("");
  const [nbhd, setNbhd] = useState("ALL");
  const [barType, setBarType] = useState("ALL");
  const [hhOnly, setHhOnly] = useState(false);
  const [sel, setSel] = useState(null);
  const [view, setView] = useState("list");
  const [votes, setVotes] = useState({});
  const [voter, setVoter] = useState("");
  const [group, setGroup] = useState(false);
  const [tip, setTip] = useState(null);

  useEffect(() => {
    const t = setInterval(() => setNow(new Date()), 30000);
    return () => clearInterval(t);
  }, []);

  const bars = CT_BARS.filter(b => {
    const q = search.toLowerCase();
    return (!q || b.name.toLowerCase().includes(q) || b.neighborhood.toLowerCase().includes(q) || b.type.toLowerCase().includes(q))
      && (nbhd === "ALL" || b.neighborhood === nbhd)
      && (barType === "ALL" || b.type === barType)
      && (!hhOnly || isHH(b, now));
  }).sort((a, b) => {
    const aH = isHH(a, now), bH = isHH(b, now);
    if (aH && !bH) return -1;
    if (!aH && bH) return 1;
    return b.rating - a.rating;
  });

  const live = CT_BARS.filter(b => isHH(b, now)).length;
  const totalV = Object.values(votes).reduce((s, arr) => s + arr.length, 0);

  function castVote(barId, e) {
    e.stopPropagation();
    if (!voter.trim()) return;
    setVotes(prev => {
      const u = {};
      Object.keys(prev).forEach(k => { u[k] = prev[k].filter(n => n !== voter); });
      u[barId] = [...(u[barId] || []), voter];
      return u;
    });
  }

  const timeStr = now.toLocaleTimeString("en-US", { hour: "numeric", minute: "2-digit", hour12: true });
  const dayStr = now.toLocaleDateString("en-US", { weekday: "long" });

  function BarDetail({ bar }) {
    const hhNow = isHH(bar, now);
    const vc = (votes[bar.id] || []).length;
    const vp = totalV ? Math.round((vc / totalV) * 100) : 0;
    return (
      <div style={{ marginTop: 10, background: "#0f0f0f", border: "1px solid " + (hhNow ? "#3a1500" : "#181818"), borderLeft: "3px solid " + (hhNow ? G : "#222"), borderRadius: 6, padding: 13 }}>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: 4 }}>
          <div>
            <div style={{ fontSize: 14, fontWeight: 700, color: "#e0e0e0" }}>{bar.name}</div>
            <div style={{ fontSize: 9, color: "#888", letterSpacing: 1, marginTop: 2 }}>{bar.neighborhood.toUpperCase()} · {bar.type.toUpperCase()} · ★ {bar.rating}</div>
          </div>
          {hhNow && <span style={{ background: G, color: "#000", fontSize: 8, fontWeight: 900, padding: "2px 7px", borderRadius: 3, letterSpacing: 1, flexShrink: 0, marginLeft: 8 }}>HH NOW</span>}
        </div>
        <div style={{ fontSize: 12, color: "#aaa", margin: "6px 0 3px" }}>{bar.deals}</div>
        <div style={{ fontSize: 10, color: "#333" }}>{bar.happyHour.days} {fmtT(bar.happyHour.start)}–{fmtT(bar.happyHour.end)}</div>
        <div style={{ display: "flex", gap: 7, marginTop: 10, flexWrap: "wrap" }}>
          {group && (
            <button onClick={e => castVote(bar.id, e)} style={{ background: "#2a0e00", border: "1px solid " + G, borderRadius: 4, padding: "5px 12px", color: G, fontSize: 9, fontWeight: 700, letterSpacing: 1, cursor: "pointer", fontFamily: "inherit" }}>
              {voter ? (vc > 0 ? "VOTED (" + vc + ")" : "VOTE") : "SET NAME FIRST"}
            </button>
          )}

          <button onClick={() => setSel(null)} style={{ background: "transparent", border: "1px solid #1e1e1e", borderRadius: 4, padding: "5px 10px", color: "#333", fontSize: 9, cursor: "pointer", fontFamily: "inherit" }}>✕</button>
        </div>

        </div>

        <div style={{ padding: "0 16px 7px", display: "flex", gap: 5, overflowX: "auto" }}>
          <select value={nbhd} onChange={e => setNbhd(e.target.value)}
            style={{ background: "#0f0f0f", border: "1px solid #1a1a1a", borderRadius: 4, padding: "5px 7px", color: "#555", fontSize: 9, fontFamily: "inherit", outline: "none", cursor: "pointer" }}>
            {ALL_NEIGHBORHOODS.map(n => <option key={n} value={n}>{n === "ALL" ? "ALL TOWNS" : n.toUpperCase()}</option>)}
          </select>
          <select value={barType} onChange={e => setBarType(e.target.value)}

            {ALL_TYPES.map(t => <option key={t} value={t}>{t === "ALL" ? "ALL TYPES" : t.toUpperCase()}</option>)}
          </select>
          <button onClick={() => setGroup(!group)}
            style={{ background: group ? "#2a0e00" : "#0f0f0f", border: "1px solid " + (group ? G : "#1a1a1a"), borderRadius: 4, padding: "5px 9px", color: group ? G : "#444", fontSize: 9, fontWeight: 700, letterSpacing: 1, cursor: "pointer", fontFamily: "inherit", whiteSpace: "nowrap" }}>
            👥 GROUP
          </button>
        </div>

        <div style={{ display: "flex", borderTop: "1px solid #141414" }}>
          {[["list","≡  LIST"],["map","◉  MAP"],["about","●  ABOUT"]].map(([v,label]) => (
            <button key={v} onClick={() => setView(v)}
              style={{ flex: 1, background: "transparent", border: "none", borderBottom: "2px solid " + (view === v ? G : "transparent"), padding: "8px", color: view === v ? G : "#333", fontSize: 9, fontWeight: 700, letterSpacing: 1, cursor: "pointer", fontFamily: "inherit" }}>
              {label}
            </button>
          ))}
        </div>
      </div>

          <input value={voter} onChange={e => setVoter(e.target.value)} placeholder="Enter your name to vote…"

            <div style={{ marginTop: 10 }}>
              <div style={{ fontSize: 8, color: "#333", letterSpacing: 2, marginBottom: 6 }}>STANDINGS</div>
              {CT_BARS.filter(b => (votes[b.id] || []).length > 0)
                .sort((a, b) => (votes[b.id] || []).length - (votes[a.id] || []).length)
                .map(b => {
                  const vc = (votes[b.id] || []).length;

                        <span style={{ fontSize: 9, color: G }}>{vc} vote{vc !== 1 ? "s" : ""}</span>
                      </div>
                      <div style={{ height: 3, background: "#141414", borderRadius: 2, overflow: "hidden" }}>
                        <div style={{ height: "100%", background: G, width: vp + "%", transition: "width 0.4s ease" }} />
                      </div>
                      <div style={{ fontSize: 8, color: "#333", marginTop: 2 }}>{(votes[b.id] || []).join(" · ")}</div>

      {/* MAP VIEW */}
      {view === "map" && (
        <div style={{ paddingBottom: 100 }}>

          {/* Canvas Map */}
          <CanvasMap bars={bars} sel={sel} setSel={setSel} now={now} live={live} />

          {/* Selected bar detail */}
          {sel && (
            <div style={{ padding: "0 14px", marginTop: 10 }}>
              <BarDetail bar={sel} />
            </div>
          )}

          {/* Bar list */}
          <div style={{ padding: "12px 14px 0" }}>
            <div style={{ fontSize: 8, color: "#666", letterSpacing: 2, marginBottom: 8 }}>
              {bars.length} BARS · TAP TO LOCATE
            </div>
            {bars.map(bar => {
              const hhNow = isHH(bar, now);
              const mu = minsUntil(bar, now);
              const isSelected = sel && sel.id === bar.id;
              return (
                <div key={bar.id}
                  onClick={() => setSel(isSelected ? null : bar)}
                  style={{
                    display: "flex", alignItems: "center", gap: 10,
                    padding: "9px 10px", marginBottom: 4,
                    background: isSelected ? "#0f0f0f" : "transparent",
                    border: "1px solid " + (isSelected ? (hhNow ? "#3a1500" : "#1e1e1e") : "transparent"),
                    borderLeft: "3px solid " + (hhNow ? G : (isSelected ? "#333" : "transparent")),
                    borderRadius: 6, cursor: "pointer"
                  }}>
                  <div style={{ width: 8, height: 8, borderRadius: "50%", background: hhNow ? G : "#252525", border: "1px solid " + (hhNow ? "#FF8C4A" : "#333"), flexShrink: 0 }} />
                  <div style={{ flex: 1, minWidth: 0 }}>
                    <div style={{ fontSize: 12, color: "#ccc", fontWeight: 600, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{bar.name}</div>
                    <div style={{ fontSize: 9, color: "#888", marginTop: 1 }}>{bar.neighborhood} · {bar.type}</div>
                  </div>
                  <div style={{ display: "flex", alignItems: "center", gap: 6, flexShrink: 0 }}>
                    {hhNow && <span style={{ fontSize: 8, color: G, fontWeight: 800, letterSpacing: 1 }}>NOW</span>}
                    {!hhNow && mu !== null && mu <= 90 && <span style={{ fontSize: 8, color: "#cc5500" }}>{mu}m</span>}
                    <button onClick={e => { e.stopPropagation(); openMaps(bar); }}
                      style={{ background: "transparent", border: "1px solid #222", borderRadius: 3, padding: "3px 7px", color: "#555", fontSize: 8, cursor: "pointer", fontFamily: "inherit" }}>↗</button>
                  </div>

      {/* LIST VIEW */}

            const vp = totalV ? Math.round((vc / totalV) * 100) : 0;

                  {hhNow && <span style={{ background: G, color: "#000", fontSize: 7, fontWeight: 900, padding: "2px 5px", borderRadius: 2, letterSpacing: 1 }}>HH NOW</span>}

                          {voter ? (vc > 0 ? "VOTED · " + vc + " (" + vp + "%)" : "VOTE") : "SET NAME FIRST"}

                          <div style={{ marginTop: 6 }}>

                            <div style={{ fontSize: 8, color: "#333", marginTop: 2 }}>{(votes[bar.id] || []).join(" · ")}</div>
                          </div>
                        )}
                      </div>
                    )}
                    <div style={{ display: "flex", gap: 6 }}>
                      <button onClick={e => { e.stopPropagation(); openMaps(bar); }}
                        style={{ background: "transparent", border: "1px solid #1e1e1e", borderRadius: 4, padding: "5px 11px", color: "#555", fontSize: 8, fontWeight: 700, letterSpacing: 1, cursor: "pointer", fontFamily: "inherit" }}>↗ MAPS</button>
                      <button onClick={e => { e.stopPropagation(); setView("map"); setSel(bar); }}
                        style={{ background: "transparent", border: "1px solid #1e1e1e", borderRadius: 4, padding: "5px 11px", color: "#555", fontSize: 8, fontWeight: 700, letterSpacing: 1, cursor: "pointer", fontFamily: "inherit" }}>◉ MAP</button>
                    </div>
                  </div>
                )}
              </div>
            );
          })}
          {bars.length === 0 && (
            <div style={{ textAlign: "center", padding: 48, color: "#222", fontSize: 12 }}>No bars match your filters</div>
          )}
        </div>
      )}

      {/* ABOUT VIEW */}
      {view === "about" && (
        <div style={{ padding: "20px 20px 100px" }}>

          {/* Hero */}
          <div style={{ marginBottom: 32 }}>
            <div style={{ fontSize: 11, color: G, letterSpacing: 3, fontWeight: 700, marginBottom: 10 }}>WHAT IS THIS</div>
            <div style={{ fontSize: 28, fontWeight: 900, color: "#fff", lineHeight: 1.1, letterSpacing: -1, fontFamily: "'Arial Black','Impact',sans-serif", marginBottom: 14 }}>
              HAPPY HOUR<br/>
              <span style={{ color: G }}>IS A LIFESTYLE.</span>
            </div>
            <p style={{ fontSize: 13, color: "#aaa", lineHeight: 1.7, margin: 0 }}>
              Aperitivo Hour CT is a live happy hour tracker built for Connecticut — showing you real deals, right now, wherever you are. But it's more than an app. It's a movement.
            </p>
          </div>

          {/* Divider */}
          <div style={{ height: 1, background: "#181818", marginBottom: 28 }} />

          {/* The Experience */}
          <div style={{ marginBottom: 28 }}>
            <div style={{ fontSize: 10, color: G, letterSpacing: 3, fontWeight: 700, marginBottom: 10 }}>THE EXPERIENCE</div>
            <div style={{ fontSize: 18, fontWeight: 900, color: "#ddd", letterSpacing: -0.5, fontFamily: "'Arial Black','Impact',sans-serif", marginBottom: 12 }}>THE POP-UP.</div>
            <p style={{ fontSize: 13, color: "#aaa", lineHeight: 1.7, margin: "0 0 12px" }}>
              Aperitivo Hour is a curated happy hour pop-up experience inspired by Italian aperitivo culture — that golden window before dinner where the drinks flow, the bites are intentional, and the energy is elevated.
            </p>
            <p style={{ fontSize: 13, color: "#aaa", lineHeight: 1.7, margin: 0 }}>
              In Italy, aperitivo isn't just a drink — it's a ritual. A moment to slow down, connect, and transition from the workday into the evening with intention. We brought that spirit to Connecticut, and gave it a soundtrack.
            </p>
          </div>

          {/* DJ / Music */}
          <div style={{ background: "#0f0f0f", border: "1px solid #1e1e1e", borderLeft: "3px solid " + G, borderRadius: 6, padding: "16px", marginBottom: 28 }}>
            <div style={{ fontSize: 10, color: G, letterSpacing: 3, fontWeight: 700, marginBottom: 12 }}>THE MUSIC</div>
            <div style={{ fontSize: 18, fontWeight: 900, color: "#fff", fontFamily: "'Arial Black','Impact',sans-serif", letterSpacing: -0.5, marginBottom: 12 }}>LIVE DJ · HOUSE & ELECTRONIC</div>
            <p style={{ fontSize: 13, color: "#aaa", lineHeight: 1.7, margin: "0 0 12px" }}>
              Every Aperitivo Hour pop-up features a live DJ set curated around house and electronic music — deep, warm, and precisely dialed for the early evening. Not a party, not background noise. Something in between.
            </p>
            <p style={{ fontSize: 13, color: "#aaa", lineHeight: 1.7, margin: 0 }}>
              The music is as intentional as the drinks. Each set is crafted to build the room slowly — setting a mood that keeps you present, keeps the conversation flowing, and makes leaving feel like a mistake.
            </p>
            <div style={{ marginTop: 16, display: "flex", gap: 8, flexWrap: "wrap" }}>
              {["DEEP HOUSE","ELECTRONIC","CURATED SETS","LIVE DJ"].map(tag => (
                <span key={tag} style={{ fontSize: 8, fontWeight: 700, letterSpacing: 2, color: G, border: "1px solid #2a1200", background: "#140800", padding: "4px 8px", borderRadius: 3 }}>{tag}</span>
              ))}
            </div>
          </div>

          {/* Founders */}
          <div style={{ background: "#0f0f0f", border: "1px solid #1e1e1e", borderLeft: "3px solid " + G, borderRadius: 6, padding: "16px", marginBottom: 28 }}>
            <div style={{ fontSize: 10, color: G, letterSpacing: 3, fontWeight: 700, marginBottom: 14 }}>CURATED BY</div>
            <div style={{ display: "flex", flexDirection: "column", gap: 14 }}>
              <div>
                <div style={{ fontSize: 15, fontWeight: 900, color: "#fff", fontFamily: "'Arial Black','Impact',sans-serif", letterSpacing: 0.5 }}>TONE ZUPA</div>
                <div style={{ fontSize: 11, color: "#555", marginTop: 3, letterSpacing: 1 }}>CO-FOUNDER · APERITIVO HOUR CT</div>
              </div>
              <div style={{ height: 1, background: "#1e1e1e" }} />
              <div>
                <div style={{ fontSize: 15, fontWeight: 900, color: "#fff", fontFamily: "'Arial Black','Impact',sans-serif", letterSpacing: 0.5 }}>ELIF GUNDUZ</div>
                <div style={{ fontSize: 11, color: "#555", marginTop: 3, letterSpacing: 1 }}>CO-FOUNDER · APERITIVO HOUR CT</div>
              </div>
            </div>
          </div>

          {/* Divider */}
          <div style={{ height: 1, background: "#181818", marginBottom: 28 }} />

          {/* The App */}
          <div style={{ marginBottom: 28 }}>
            <div style={{ fontSize: 10, color: G, letterSpacing: 3, fontWeight: 700, marginBottom: 10 }}>WHY THE APP</div>
            <div style={{ fontSize: 18, fontWeight: 900, color: "#ddd", letterSpacing: -0.5, fontFamily: "'Arial Black','Impact',sans-serif", marginBottom: 12 }}>HAPPY HOUR IS<br/>CORE TO THE BRAND.</div>
            <p style={{ fontSize: 13, color: "#aaa", lineHeight: 1.7, margin: "0 0 12px" }}>
              We didn't just want to throw pop-ups — we wanted to build something lasting. A tool that makes the aperitivo mindset accessible every single day, at any bar in Connecticut.
            </p>
            <p style={{ fontSize: 13, color: "#aaa", lineHeight: 1.7, margin: "0 0 12px" }}>
              The pop-ups are the heartbeat. The app is the infrastructure. Together they create a culture around happy hour — one that's upscale, intentional, and unapologetically social.
            </p>
            <p style={{ fontSize: 13, color: "#aaa", lineHeight: 1.7, margin: 0 }}>
              Every bar with a deal deserves to be found. Every person looking for a good time deserves to know where to go — right now, not after ten minutes of Googling. Happy hour isn't an afterthought. For us, it's the whole point.
            </p>
          </div>

          {/* Divider */}
          <div style={{ height: 1, background: "#181818", marginBottom: 28 }} />

          {/* Provided by */}
          <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between" }}>
            <div>
              <div style={{ fontSize: 9, color: "#333", letterSpacing: 2, marginBottom: 6 }}>PROVIDED BY</div>
              <img src={WOCO_LOGO} alt="Woco" style={{ height: 22, width: "auto", borderRadius: 3 }} />
            </div>
            <div style={{ fontSize: 10, color: "#666", textAlign: "right", letterSpacing: 1 }}>
              <div>{CT_BARS.length} BARS TRACKED</div>
              <div style={{ marginTop: 3 }}>CONNECTICUT</div>
            </div>
          </div>

        </div>
      )}

      {/* BOTTOM BAR */}
      <div style={{ position: "fixed", bottom: 0, left: "50%", transform: "translateX(-50%)", width: "100%", maxWidth: 480, background: "#070707", borderTop: "1px solid #111", padding: "9px 16px 16px", display: "flex", alignItems: "center", justifyContent: "space-between", zIndex: 100 }}>
        <div style={{ fontSize: 8, color: "#555", letterSpacing: 2 }}>APERITIVO CT · {CT_BARS.length} BARS</div>
        <div style={{ display: "flex", alignItems: "center", gap: 5 }}>
          <div style={{ width: 5, height: 5, borderRadius: "50%", background: G, animation: "pulse 2s infinite" }} />
          <div style={{ fontSize: 8, color: "#333", letterSpacing: 1 }}>{live} ACTIVE</div>
        </div>
      </div>

      <style>{`
        @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.2} }
        input::placeholder { color: #282828; }
        select option { background: #0f0f0f; }
        * { -webkit-tap-highlight-color: transparent; box-sizing: border-box; }
        ::-webkit-scrollbar { width: 3px; height: 3px; }
        ::-webkit-scrollbar-track { background: #070707; }
        ::-webkit-scrollbar-thumb { background: #1a1a1a; border-radius: 2px; }
      `}</style>
    </div>
  );
}

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(React.createElement(App));
  </script>
</body>
</html>
