function isHH(bar, now) {
  const h = now.getHours() + now.getMinutes() / 60;
  const d = now.getDay();
  const hh = bar.happyHour;
  const wd = [1, 2, 3, 4, 5];
  if (hh.days === "Daily")   return h >= hh.start && h < hh.end;
  if (hh.days === "Mon-Fri"  && wd.includes(d))              return h >= hh.start && h < hh.end;
  if (hh.days === "Mon-Thu"  && [1,2,3,4].includes(d))       return h >= hh.start && h < hh.end;
  if (hh.days === "Mon-Sat"  && (wd.includes(d) || d === 6)) return h >= hh.start && h < hh.end;
  if (hh.days === "Tue-Fri"  && [2,3,4,5].includes(d))       return h >= hh.start && h < hh.end;
  if (hh.days === "Tue-Sat"  && [2,3,4,5,6].includes(d))     return h >= hh.start && h < hh.end;
  if (hh.days === "Wed-Fri"  && [3,4,5].includes(d))         return h >= hh.start && h < hh.end;
  if (hh.days === "Mon-Mon"  && d === 1)                      return h >= hh.start && h < hh.end;
  if (d === 6 && hh.sat) return h >= hh.satStart && h < hh.satEnd;
  return false;
}

function secsUntilEnd(bar, now) {
  const h = now.getHours() * 3600 + now.getMinutes() * 60 + now.getSeconds();
  const hh = bar.happyHour;
  if (!isHH(bar, now)) return null;
  return hh.end * 3600 - h;
}

function fmtCountdown(secs) {
  if (secs <= 0) return "ending";
  const h = Math.floor(secs / 3600);
  const m = Math.floor((secs % 3600) / 60);
  const s = secs % 60;
  if (h > 0) return h + "h " + m + "m left";
  if (m > 0) return m + "m " + s + "s left";
  return s + "s left";
}

function isStartingSoon(bar, now) {
  const mu = minsUntil(bar, now);
  return mu !== null && mu > 0 && mu <= 60;
}

function getDayIndex(dayName) {
  return ["Sunday","Monday","Tuesday","Wednesday","Thursday","Friday","Saturday"].indexOf(dayName);
}

function isHHOnDay(bar, dayIdx) {
  const hh = bar.happyHour;
  const wd = [1,2,3,4,5];
  if (hh.days === "Daily") return true;
  if (hh.days === "Mon-Fri" && wd.includes(dayIdx)) return true;
  if (hh.days === "Mon-Thu" && [1,2,3,4].includes(dayIdx)) return true;
  if (hh.days === "Mon-Sat" && (wd.includes(dayIdx) || dayIdx === 6)) return true;
  if (hh.days === "Tue-Fri" && [2,3,4,5].includes(dayIdx)) return true;
  if (hh.days === "Tue-Sat" && [2,3,4,5,6].includes(dayIdx)) return true;
  if (hh.days === "Wed-Fri" && [3,4,5].includes(dayIdx)) return true;
  if (dayIdx === 6 && hh.sat) return true;
  return false;
}

function minsUntil(bar, now) {
  const h = now.getHours() + now.getMinutes() / 60;
  const d = now.getDay();
  const hh = bar.happyHour;
  const wd = [1, 2, 3, 4, 5];
  const ok = hh.days === "Daily"
    || (hh.days === "Mon-Fri" && wd.includes(d))
    || (hh.days === "Mon-Thu" && [1,2,3,4].includes(d))
    || (hh.days === "Mon-Sat" && (wd.includes(d) || d === 6))
    || (hh.days === "Tue-Fri" && [2,3,4,5].includes(d))
    || (hh.days === "Tue-Sat" && [2,3,4,5,6].includes(d))
    || (hh.days === "Wed-Fri" && [3,4,5].includes(d));
  if (!ok || h >= hh.end) return null;
  if (h < hh.start) return Math.round((hh.start - h) * 60);
  return 0;
}

const LAT_MIN = 40.95, LAT_MAX = 42.05, LNG_MIN = -73.73, LNG_MAX = -71.78;

function projectFull(lat, lng, W, H) {
  const pad = 0.04;
  const x = ((lng - LNG_MIN) / (LNG_MAX - LNG_MIN)) * W * (1 - pad * 2) + W * pad;
  const y = (1 - (lat - LAT_MIN) / (LAT_MAX - LAT_MIN)) * H * (1 - pad * 2) + H * pad;
  return [x, y];
}

function projectZoom(lat, lng, W, H, fLat, fLng) {
  const scale = 22;
  const x = (lng - fLng) * scale * W * 0.1 + W / 2;
  const y = (fLat - lat) * scale * H * 0.13 + H / 2;
  return [x, y];
}

function CanvasMap({ bars, sel, setSel, now, live }) {
  const canvasRef = useRef(null);
  const containerRef = useRef(null);
  const [W, setW] = useState(420);
  const H = Math.round(W * 0.82);
  const DPR = typeof window !== 'undefined' ? window.devicePixelRatio || 1 : 1;

  useEffect(() => {
    if (containerRef.current) setW(containerRef.current.offsetWidth || 420);
  }, []);

  const proj = (lat, lng) => sel
    ? projectZoom(lat, lng, W, H, sel.lat, sel.lng)
    : projectFull(lat, lng, W, H);

  useEffect(() => {
    const canvas = canvasRef.current;
    if (!canvas) return;
    canvas.width = W * DPR;
    canvas.height = H * DPR;
    const ctx = canvas.getContext('2d');
    ctx.scale(DPR, DPR);
    ctx.clearRect(0, 0, W, H);

    // ── BACKGROUND ──
    const bg = ctx.createLinearGradient(0, 0, W, H);
    bg.addColorStop(0, '#0e0e0e');
    bg.addColorStop(1, '#141414');
    ctx.fillStyle = bg;
    ctx.fillRect(0, 0, W, H);

    if (!sel) {
      // Subtle grid
      ctx.strokeStyle = 'rgba(255,255,255,0.025)';
      ctx.lineWidth = 0.5;
      for (let i = 1; i < 8; i++) {
        ctx.beginPath(); ctx.moveTo(W * i / 8, 0); ctx.lineTo(W * i / 8, H); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(0, H * i / 8); ctx.lineTo(W, H * i / 8); ctx.stroke();
      }

      // ── CT STATE FILL ──
      const pts = CT_SHAPE.map(([la, ln]) => projectFull(la, ln, W, H));
      ctx.beginPath();
      ctx.moveTo(pts[0][0], pts[0][1]);
      pts.slice(1).forEach(([x, y]) => ctx.lineTo(x, y));
      ctx.closePath();
      const stateFill = ctx.createLinearGradient(0, 0, W, H);
      stateFill.addColorStop(0, '#1e1e1e');
      stateFill.addColorStop(1, '#1a1a1a');
      ctx.fillStyle = stateFill;
      ctx.fill();
      ctx.strokeStyle = 'rgba(255,107,26,0.25)';
      ctx.lineWidth = 1.5;
      ctx.stroke();

      // ── ROADS ──
      CT_ROADS.forEach(([a, b]) => {
        const [x1, y1] = projectFull(a[0], a[1], W, H);
        const [x2, y2] = projectFull(b[0], b[1], W, H);
        ctx.beginPath();
        ctx.moveTo(x1, y1); ctx.lineTo(x2, y2);
        ctx.strokeStyle = 'rgba(255,255,255,0.06)';
        ctx.lineWidth = 1;
        ctx.stroke();
      });

      // ── TOWN LABELS ──
      CT_TOWNS.forEach(t => {
        const [x, y] = projectFull(t.lat, t.lng, W, H);
        ctx.font = `600 ${Math.max(8, Math.round(W * 0.019))}px monospace`;
        ctx.textAlign = 'center';
        ctx.fillStyle = 'rgba(255,255,255,0.12)';
        ctx.fillText(t.name, x, y);
      });

    } else {
      // ── ZOOMED: subtle grid ──
      ctx.strokeStyle = 'rgba(255,255,255,0.04)';
      ctx.lineWidth = 0.5;
      for (let i = 1; i < 6; i++) {
        ctx.beginPath(); ctx.moveTo(W * i / 6, 0); ctx.lineTo(W * i / 6, H); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(0, H * i / 6); ctx.lineTo(W, H * i / 6); ctx.stroke();
      }
      // Neighborhood label
      ctx.font = `700 ${Math.round(W * 0.028)}px monospace`;
      ctx.textAlign = 'center';
      ctx.fillStyle = 'rgba(255,255,255,0.07)';
      ctx.fillText(sel.neighborhood.toUpperCase(), W / 2, H / 2 + 4);
    }

    // ── BAR DOTS ──
    // Draw non-HH first, then HH on top
    const sorted = [...CT_BARS].sort((a, b) => {
      const aH = isHH(a, now), bH = isHH(b, now);
      return aH === bH ? 0 : aH ? 1 : -1;
    });

    sorted.forEach(bar => {
      const [x, y] = proj(bar.lat, bar.lng);
      if (x < -20 || x > W + 20 || y < -20 || y > H + 20) return;
      const inFilter = bars.includes(bar);
      const hhNow = isHH(bar, now);
      const isSel = sel && sel.id === bar.id;

      if (!inFilter && !isSel) {
        // Dimmed dot
        ctx.beginPath();
        ctx.arc(x, y, 3, 0, Math.PI * 2);
        ctx.fillStyle = 'rgba(255,255,255,0.06)';
        ctx.fill();
        return;
      }

      if (hhNow) {
        // Outer glow ring
        const grad = ctx.createRadialGradient(x, y, 2, x, y, 14);
        grad.addColorStop(0, 'rgba(255,107,26,0.35)');
        grad.addColorStop(1, 'rgba(255,107,26,0)');
        ctx.beginPath();
        ctx.arc(x, y, 14, 0, Math.PI * 2);
        ctx.fillStyle = grad;
        ctx.fill();
      }

      const r = isSel ? 10 : hhNow ? 7 : 5;
      ctx.beginPath();
      ctx.arc(x, y, r, 0, Math.PI * 2);
      if (isSel) {
        ctx.fillStyle = '#fff';
      } else if (hhNow) {
        const dotGrad = ctx.createRadialGradient(x - 1, y - 1, 0, x, y, r);
        dotGrad.addColorStop(0, '#FF8C3A');
        dotGrad.addColorStop(1, '#FF5500');
        ctx.fillStyle = dotGrad;
      } else {
        ctx.fillStyle = '#3a3a3a';
      }
      ctx.fill();

      ctx.strokeStyle = isSel ? '#FF6B1A' : hhNow ? '#FFB380' : '#555';
      ctx.lineWidth = isSel ? 2.5 : 1.5;
      ctx.stroke();

      // Label for selected dot
      if (isSel) {
        const label = bar.name;
        ctx.font = `700 ${Math.round(W * 0.032)}px monospace`;
        const tw = ctx.measureText(label).width;
        const bx = Math.min(Math.max(x - tw / 2 - 10, 4), W - tw - 24);
        const by = y - r - 26;
        // Badge bg
        ctx.fillStyle = 'rgba(7,7,7,0.95)';
        ctx.beginPath();
        ctx.roundRect(bx, by, tw + 20, 24, 4);
        ctx.fill();
        ctx.strokeStyle = '#FF6B1A';
        ctx.lineWidth = 1;
        ctx.stroke();
        ctx.fillStyle = '#fff';
        ctx.textAlign = 'left';
        ctx.fillText(label, bx + 10, by + 16);
        // connector line
        ctx.beginPath();
        ctx.moveTo(x, by + 24); ctx.lineTo(x, y - r - 2);
        ctx.strokeStyle = 'rgba(255,107,26,0.5)';
        ctx.lineWidth = 1;
        ctx.stroke();
      }
    });

    // ── LEGEND ──
    const fs = Math.max(9, Math.round(W * 0.022));
    ctx.font = `600 ${fs}px monospace`;
    ctx.textAlign = 'left';

    // HH NOW
    const lg = ctx.createRadialGradient(12, H - 13, 0, 12, H - 13, 6);
    lg.addColorStop(0, '#FF8C3A'); lg.addColorStop(1, '#FF5500');
    ctx.beginPath(); ctx.arc(12, H - 13, 6, 0, Math.PI * 2);
    ctx.fillStyle = lg; ctx.fill();
    ctx.strokeStyle = '#FFB380'; ctx.lineWidth = 1.5; ctx.stroke();
    ctx.fillStyle = 'rgba(255,255,255,0.5)';
    ctx.fillText('HH NOW', 24, H - 9);

    // UPCOMING
    ctx.beginPath(); ctx.arc(95, H - 13, 5, 0, Math.PI * 2);
    ctx.fillStyle = '#3a3a3a'; ctx.fill();
    ctx.strokeStyle = '#555'; ctx.lineWidth = 1; ctx.stroke();
    ctx.fillStyle = 'rgba(255,255,255,0.3)';
    ctx.fillText('LATER', 106, H - 9);

  }, [bars, sel, now, W, H, DPR]);

  const handleClick = (e) => {
    const rect = canvasRef.current.getBoundingClientRect();
    const cx = (e.clientX - rect.left) * (W / rect.width);
    const cy = (e.clientY - rect.top) * (H / rect.height);
    let closest = null, minDist = 22;
    bars.forEach(bar => {
      const [x, y] = proj(bar.lat, bar.lng);
      const d = Math.hypot(cx - x, cy - y);
      if (d < minDist) { minDist = d; closest = bar; }
    });
    setSel(closest && sel?.id === closest.id ? null : closest);
  };

  return (
    <div ref={containerRef} style={{ position: "relative", width: "100%", background: "#0e0e0e" }}>
      <canvas
        ref={canvasRef}
        width={W * DPR} height={H * DPR}
        onClick={handleClick}
        style={{ width: "100%", height: "auto", display: "block", cursor: "crosshair" }}
      />
      {/* Live pill */}
      <div style={{ position: "absolute", top: 10, left: 10, background: "rgba(7,7,7,0.92)", border: "1px solid rgba(255,107,26,0.4)", borderRadius: 20, padding: "5px 12px", display: "flex", alignItems: "center", gap: 6 }}>
        <div style={{ width: 6, height: 6, borderRadius: "50%", background: "#FF6B1A", animation: "pulse 2s infinite" }} />
        <span style={{ fontSize: 9, color: "#FF6B1A", fontWeight: 700, letterSpacing: 2, fontFamily: "monospace" }}>{live} LIVE NOW</span>
      </div>
      {/* Zoom out */}
      {sel && (
        <button onClick={() => setSel(null)}
          style={{ position: "absolute", top: 10, right: 10, background: "rgba(7,7,7,0.92)", border: "1px solid #333", borderRadius: 20, padding: "5px 12px", color: "#e8e4dc", fontSize: 9, fontWeight: 700, letterSpacing: 1, cursor: "pointer", fontFamily: "monospace" }}>
          ← ALL CT
        </button>
      )}
    </div>
  );
}

            style={{ flex: 1, background: "#0f0f0f", border: "1px solid #1a1a1a", borderRadius: 4, padding: "7px 10px", color: "#e8e4dc", fontSize: 11, fontFamily: "inherit", outline: "none" }} />

        <div style={{ position: "fixed", inset: 0, background: "rgba(0,0,0,0.85)", zIndex: 500, display: "flex", alignItems: "flex-end", justifyContent: "center" }}
          onClick={e => { if (e.target === e.currentTarget) { setClaimBar(null); setClaimStatus(null); } }}>
          <div style={{ background: "#0f0f0f", border: "1px solid #2a1200", borderTop: "3px solid " + G, borderRadius: "12px 12px 0 0", width: "100%", maxWidth: 480, padding: 20, maxHeight: "90vh", overflowY: "auto" }}>

            {/* Header */}
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: 16 }}>
              <div>
                <div style={{ fontSize: 11, color: G, fontWeight: 700, letterSpacing: 2, marginBottom: 4 }}>CLAIM THIS LISTING</div>
                <div style={{ fontSize: 16, fontWeight: 900, color: "#f5f2ee", fontFamily: "'Arial Black',sans-serif" }}>{claimBar.name}</div>
                <div style={{ fontSize: 10, color: "#9a9088", marginTop: 2 }}>{claimBar.neighborhood.toUpperCase()} · CONNECTICUT</div>
              </div>
              <button onClick={() => { setClaimBar(null); setClaimStatus(null); }}
                style={{ background: "transparent", border: "1px solid #222", borderRadius: 4, padding: "5px 9px", color: "#666", fontSize: 11, cursor: "pointer", fontFamily: "inherit" }}>✕</button>
            </div>

            {claimStatus === "sent" ? (
              <div style={{ textAlign: "center", padding: "28px 0" }}>
                <div style={{ fontSize: 36, marginBottom: 12 }}>🍊</div>
                <div style={{ fontSize: 15, fontWeight: 900, color: "#f5f2ee", fontFamily: "'Arial Black',sans-serif", marginBottom: 8 }}>REQUEST RECEIVED</div>
                <p style={{ fontSize: 12, color: "#9a9088", lineHeight: 1.7 }}>
                  We'll review your claim and get back to you at {claimForm.email} within 24–48 hours.
                </p>
                <button onClick={() => { setClaimBar(null); setClaimStatus(null); }}
                  style={{ marginTop: 20, background: G, border: "none", borderRadius: 6, padding: "10px 28px", color: "#000", fontSize: 11, fontWeight: 900, cursor: "pointer", fontFamily: "inherit", letterSpacing: 1 }}>
                  DONE
                </button>
              </div>
            ) : (
              <>
                {/* Info banner */}
                <div style={{ background: "#1a0800", border: "1px solid #2a1200", borderRadius: 6, padding: "10px 12px", marginBottom: 16 }}>
                  <p style={{ fontSize: 11, color: "#c8c0b8", lineHeight: 1.6, margin: 0 }}>
                    Claiming your listing lets you update your happy hour deals, post specials, and get featured placement. Only verified owners and managers are approved.
                  </p>
                </div>

                {/* Form fields */}
                {[
                  { key: "name",    label: "YOUR FULL NAME",          placeholder: "Jane Smith",              required: true },
                  { key: "title",   label: "YOUR TITLE",              placeholder: "Owner / Manager / GM",    required: false },
                  { key: "email",   label: "YOUR EMAIL",              placeholder: "jane@barname.com",        required: true },
                  { key: "phone",   label: "YOUR PHONE",              placeholder: "(203) 555-0100",          required: false },
                ].map(f => (
                  <div key={f.key} style={{ marginBottom: 12 }}>
                    <div style={{ fontSize: 9, color: "#777", letterSpacing: 2, marginBottom: 5 }}>{f.label}{f.required ? " *" : ""}</div>
                    <input
                      value={claimForm[f.key]}
                      onChange={e => setClaimForm(p => ({ ...p, [f.key]: e.target.value }))}
                      placeholder={f.placeholder}
                      type={f.key === "email" ? "email" : f.key === "phone" ? "tel" : "text"}
                      style={{ width: "100%", boxSizing: "border-box", background: "#141414", border: "1px solid #222", borderRadius: 4, padding: "9px 12px", color: "#f0ece4", fontSize: 13, fontFamily: "inherit", outline: "none" }}
                    />
                  </div>
                ))}

                {/* Spam-killer question */}
                <div style={{ marginBottom: 16 }}>
                  <div style={{ fontSize: 9, color: G, letterSpacing: 2, marginBottom: 5 }}>LIQUOR LICENSE — BUSINESS NAME *</div>
                  <input
                    value={claimForm.license}
                    onChange={e => setClaimForm(p => ({ ...p, license: e.target.value }))}
                    placeholder="Exact name on your CT liquor license"
                    style={{ width: "100%", boxSizing: "border-box", background: "#141414", border: "1px solid " + G, borderRadius: 4, padding: "9px 12px", color: "#f0ece4", fontSize: 13, fontFamily: "inherit", outline: "none" }}
                  />
                  <div style={{ fontSize: 9, color: "#555", marginTop: 4 }}>This is how we verify you're the actual owner or manager.</div>
                </div>

                {/* Submit */}
                <button
                  onClick={e => submitClaim(claimBar, e)}
                  disabled={claimStatus === "sending" || !claimForm.name || !claimForm.email || !claimForm.license}
                  style={{
                    width: "100%", background: (!claimForm.name || !claimForm.email || !claimForm.license) ? "#1a1a1a" : G,
                    border: "none", borderRadius: 6, padding: "12px", color: (!claimForm.name || !claimForm.email || !claimForm.license) ? "#444" : "#000",
                    fontSize: 12, fontWeight: 900, letterSpacing: 2, cursor: "pointer", fontFamily: "'Arial Black',sans-serif",
                    transition: "all 0.2s"
                  }}>
                  {claimStatus === "sending" ? "SENDING..." : "SUBMIT CLAIM →"}
                </button>
                <div style={{ fontSize: 9, color: "#444", textAlign: "center", marginTop: 10 }}>
                  Submitted to WAVYOAKSCO@gmail.com · Reviewed within 24–48hrs
                </div>
              </>
            )}
          </div>
        </div>
      )}

      <style>{`
        @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.2} }
        input::placeholder { color: #282828; }
        select option { background: #0f0f0f; }
        * { -webkit-tap-highlight-color: transparent; box-sizing: border-box; }
        ::-webkit-scrollbar { width: 3px; height: 3px; }
        ::-webkit-scrollbar-track { background: #070707; }
        ::-webkit-scrollbar-thumb { background: #1a1a1a; border-radius: 2px; }
      `}</style>
    </div>
  );
}


const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App />);

</script>
</body>
</html>
